# Copia este archivo a config.yaml y ajusta valores.

sitios: ["occ"]
browser: "chrome"
debugger_address: ""  # ej. "127.0.0.1:9222" si usas navegador ya abierto
cv_path: "tu_cv.pdf"
max_postulaciones_dia: 10
occ_max_scan_per_keyword: 6
controlled_mode: true

# --- Cuota diaria entre ejecuciones ---
# Si count_from_csv: true, se cuentan las filas de hoy en el CSV (Status sin "Simulado"/"dry")
# y el bot solo usará el saldo restante hasta max_postulaciones_dia.
daily_quota:
  count_from_csv: true
  count_simulated_for_quota: false  # si true, también cuentan filas de dry-run
  csv_path: postulaciones.csv        # opcional; también puedes usar postulaciones_csv arriba al mismo nivel

# postulaciones_csv: postulaciones.csv  # alternativa al csv_path de daily_quota

# --- Rotación de búsquedas (no siempre empezar por la primera keyword) ---
search:
  rotate_keywords: true
  state_file: chambaflow_state.yaml   # guarda el offset; puedes borrarlo para resetear
  reset_keyword_rotation_daily: false # si true, cada día nuevo el offset vuelve a 0

# Keywords: lista de textos o entradas con variantes de búsqueda
keywords:
  - "desarrollador react"
  - query: "full stack developer"
    extra_queries:
      - "desarrollador full stack"
      - "fullstack remoto"

# Filtros (occ_filter también aplica por defecto a computrabajo/indeed si no tienen el suyo)
occ_filter:
  exclude_terms: []
  exclude_regex: []
  include_tech_terms: []
  keyword_ignore_tokens: []
  sort_by_date: true
  # Rango de días desde publicación. Ejemplo 1..3 = solo vacantes de 1, 2 o 3 días.
  min_days_old: 1
  max_days_old: 3
  # Si true y no se puede leer la fecha en la card ni en el panel, no postula a esa vacante.
  reject_unknown_posting_age: false
  max_pages_when_sorted_by_date: 1
  # Si no está vacío, el título DEBE contener al menos uno de estos substrings:
  include_title_must_contain_any: []
  # ej. para forzar stack: ["react", "frontend", "typescript"]

# Modal de conocimientos (solo OCC)
occ_modal:
  max_attempts: 4
  preferred_skill_ratings: ["3", "2", "4", "1"]  # orden de niveles data-rating a preferir
