cv_path: "tu_cv.pdf"
max_postulaciones_dia: 10
sitios:
  - "occ"
browser: "brave"
debugger_address: "127.0.0.1:9222"
controlled_mode: true
occ_max_scan_per_keyword: 12
dias_antiguedad: 7
gemini_api_key: "TU_API_KEY_AQUI"
user_profile: |
  # (Opcional) Describe tu perfil en texto libre para que el bot pueda usarlo
  # en prompts de IA (por ejemplo para Indeed en el futuro).
  # Ejemplo:
  # Soy un desarrollador de software con experiencia en desarrollo web.
  # Busco vacantes remotas en México.
  # Tengo experiencia con React, Next.js, TypeScript, TypeScript y AWS.

# Filtro de relevancia específico para OCC (ejemplo genérico).
occ_filter:
  # Ordenar listado por Fecha (más recientes primero). Si false, se usa Relevancia.
  sort_by_date: true
  # No postular a vacantes de más de N días (límite 1 mes). Se usa si la card muestra "hace X días".
  max_days_old: 30
  # Con orden por fecha: solo procesar esta cantidad de páginas (1 = solo primera página = ofertas recientes, ~1 mes).
  max_pages_when_sorted_by_date: 1

  # Títulos que se descartan si contienen alguna de estas palabras (palabra completa; "java" no excluye "javascript").
  # Ejemplo por defecto: evitar Java / Spring enterprise.
  exclude_terms:
    - "java"
    - "java "
    - " spring boot"
    - "springboot"
    - "spring framework"
    - "springframework"
    - "hibernate"
    - "jakarta ee"
    - "j2ee"
    - "jee"

  # Expresiones regulares para excluir títulos completos (opcional).
  # Puedes dejarlo vacío o añadir patrones como ".*php.*backend.*" si no quieres PHP, etc.
  exclude_regex: []

  # Palabras clave que SI te interesan (stack objetivo).
  # Si el título contiene alguna de estas, se considera relevante (salvo que caiga en exclude_terms / exclude_regex).
  include_tech_terms:
    - "react"
    - "frontend"
    - "front-end"
    - "full stack"
    - "fullstack"
    - "developer"
    - "desarrollador"
    - "programador"
    - "software"
    - "backend"
    - "typescript"
    - "javascript"
    - "next"
    - "next.js"
    - "angular"
    - "vue"
    - ".net"
    - "web"
    - "python"
    - "node"

  # Palabras de relleno que se ignoran al extraer tokens de la keyword
  # (para el fallback que compara texto de la keyword con el título).
  keyword_ignore_tokens:
    - "remoto"
    - "mexico"
    - "méxico"
    - "puebla"
    - "cdmx"
    - "junior"
    - "sr"
    - "senior"
    - "jr"
    - "de"
    - "en"
    - "y"
    - "-"
    - "/"

# Filtro y datos de contacto para Indeed (opcional).
# Si no existe, se usa occ_filter para filtros de relevancia.
indeed_filter:
  contact:
    nombre: ""
    apellido: ""
    telefono: ""
  # Opcional: exclude_terms, include_tech_terms, etc. Si se omiten, se usa occ_filter.
